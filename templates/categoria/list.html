<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Categorías de Gastos</h2>
            <div>
                <a href="{% url 'registro:registro_list' %}" class="btn btn-outline-secondary me-2">Ver Registros</a>
                <a href="{% url 'categoria:categoria_create' %}" class="btn btn-primary">+ Nueva Categoría</a>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for categoria in categorias %}
                        <tr>
                            <td><strong>{{ categoria.nombre }}</strong></td>
                            <td>{{ categoria.descripcion|default:"Sin descripción" }}</td>
                            <td class="text-end">
                                <a href="{% url 'categoria:categoria_update' categoria.id %}" class="btn btn-sm btn-warning">Editar</a>
                                <a href="{% url 'categoria:categoria_delete' categoria.id %}" class="btn btn-sm btn-danger">Eliminar</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-center text-muted py-4">No hay categorías registradas todavía.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
